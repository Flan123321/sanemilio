<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" style="display:block">

  <!-- ══ ICONO: EDIFICIO / CASA (blanco sobre oscuro) ══ -->

  <!-- Casa: techo -->
  <polygon points="108,118 158,80 208,118" fill="rgba(255,255,255,0.92)"/>
  <!-- Chimeneas -->
  <rect x="121" y="90" width="12" height="30" fill="rgba(255,255,255,0.92)"/>
  <rect x="183" y="90" width="12" height="30" fill="rgba(255,255,255,0.92)"/>
  <!-- Muros -->
  <rect x="108" y="118" width="14" height="68" fill="rgba(255,255,255,0.92)"/>
  <rect x="194" y="118" width="14" height="68" fill="rgba(255,255,255,0.92)"/>
  <!-- Travesaño -->
  <rect x="108" y="152" width="100" height="8" fill="rgba(255,255,255,0.92)"/>
  <!-- Rascacielos centro -->
  <rect x="214" y="92" width="28" height="10" fill="rgba(255,255,255,0.92)"/>
  <rect x="220" y="102" width="16" height="84" fill="rgba(255,255,255,0.92)"/>

  <!-- Marco naranja (3 lados) -->
  <rect x="258" y="62" width="80" height="10" fill="#E85D0A"/>
  <rect x="258" y="62" width="10" height="124" fill="#E85D0A"/>
  <rect x="328" y="62" width="10" height="124" fill="#E85D0A"/>

  <!-- Diagonal blanca -->
  <line x1="148" y1="68" x2="348" y2="120"
        stroke="rgba(255,255,255,0.85)" stroke-width="13" stroke-linecap="round"/>

  <!-- ══ TEXTO ══ -->

  <!-- Línea fina sobre "San" -->
  <rect x="14" y="148" width="60" height="3" fill="rgba(255,255,255,0.6)" rx="1.5"/>

  <!-- "San" naranja -->
  <text x="16" y="186"
    font-family="'Montserrat','Arial Black',Arial,sans-serif"
    font-weight="800" font-size="44" fill="#E85D0A" letter-spacing="-0.5">San</text>

  <!-- "Emilio" blanco -->
  <text x="8" y="248"
    font-family="'Montserrat','Arial Black',Arial,sans-serif"
    font-weight="900" font-size="92" fill="#FFFFFF" letter-spacing="-2">Emilio</text>

  <!-- "PROPIEDADES" blanco suave -->
  <text x="8" y="272"
    font-family="'Montserrat','Arial Black',Arial,sans-serif"
    font-weight="600" font-size="22" fill="rgba(255,255,255,0.65)" letter-spacing="7">PROPIEDADES</text>

</svg>